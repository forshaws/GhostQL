<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 850" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>

    <linearGradient id="ghostGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="1"/>
      <stop offset="40%" stop-color="#818CF8" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#C084FC" stop-opacity="0.0"/>
    </linearGradient>

    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="850" rx="40" fill="url(#bgGrad)"/>

  <g opacity="0.25">
    <line x1="150" y1="250" x2="650" y2="250" stroke="#64748B" stroke-width="2" stroke-dasharray="8 8"/>
    <line x1="150" y1="400" x2="650" y2="400" stroke="#64748B" stroke-width="2" stroke-dasharray="8 8"/>
    <line x1="150" y1="550" x2="650" y2="550" stroke="#64748B" stroke-width="2" stroke-dasharray="8 8"/>
    
    <line x1="250" y1="150" x2="250" y2="700" stroke="#64748B" stroke-width="2" stroke-dasharray="4 12"/>
    <line x1="550" y1="150" x2="550" y2="700" stroke="#64748B" stroke-width="2" stroke-dasharray="4 12"/>
  </g>

  <g font-family="monospace" font-size="14" fill="#64748B" opacity="0.4">
    <text x="570" y="245">SELECT *</text>
    <text x="570" y="395">WHERE token=</text>
    <text x="570" y="545">WITH PQR</text>
    <text x="110" y="245">0x7F4B</text>
    <text x="110" y="395">0x8A2C</text>
  </g>

  <g transform="translate(0, 20)">
    <path d="M 250,400 
             C 250,220 550,220 550,400 
             C 550,520 550,600 550,680 
             L 510,640 L 470,680 L 430,640 L 390,680 L 350,640 L 310,680 L 250,600 Z" 
          fill="#38BDF8" filter="blur(40px)" opacity="0.3"/>

    <path d="M 250,400 
             C 250,200 550,200 550,400 
             C 550,540 550,620 550,720 
             Q 500,670 466,720 
             Q 433,670 400,720 
             Q 366,670 333,720 
             Q 300,670 250,720
             C 250,620 250,540 250,400 Z" 
          fill="url(#ghostGrad)"/>

    <path d="M 270,400 
             C 270,240 530,240 530,400
             C 530,480 530,530 530,580
             C 400,540 350,540 270,580 Z" 
          fill="url(#glowGrad)" opacity="0.6"/>

    <rect x="340" y="340" width="35" height="50" rx="17.5" fill="#0F172A"/>
    <circle cx="352" cy="352" r="7" fill="#FFFFFF"/>
    
    <rect x="425" y="340" width="35" height="50" rx="17.5" fill="#0F172A"/>
    <circle cx="437" cy="352" r="7" fill="#FFFFFF"/>

    <path d="M 380,410 Q 400,430 420,410" stroke="#0F172A" stroke-width="6" stroke-linecap="round" fill="none"/>
  </g>

  <text x="400" y="780" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-weight="800" font-size="52" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">
    Ghost<tspan fill="#38BDF8">QL</tspan>
  </text>
</svg>
